# dbt Snowflake 连接配置
# dev: 本地开发，写入 DEV schema（不影响生产）
# prod: MWAA 生产调度，写入 PUBLIC schema

quicksight_analytics:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'MANUFACTURING_DEMO_API_ROLE') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'MANUFACTURING_DEMO') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'MANUFACTURING_DEMO_WH') }}"
      schema: DEV
      threads: 4
      client_session_keep_alive: False
      
    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'MANUFACTURING_DEMO_API_ROLE') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'MANUFACTURING_DEMO') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'MANUFACTURING_DEMO_WH') }}"
      schema: PUBLIC
      threads: 8
      client_session_keep_alive: False
