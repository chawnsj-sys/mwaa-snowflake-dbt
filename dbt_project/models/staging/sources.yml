version: 2

sources:
  - name: raw_landing
    description: Snowpipe 数据落地层（S3 Parquet 自动加载）
    database: QUICKSIGHT_DB
    schema: RAW_LANDING

    tables:
      - name: customers
        description: 客户数据（Snowpipe 按天追加）
        columns:
          - name: customer_id
            description: 客户唯一标识
            tests:
              - not_null
          - name: customer_name
            description: 客户姓名
            tests:
              - not_null
          - name: email
            description: 客户邮箱
          - name: city
            description: 城市
          - name: registration_date
            description: 注册日期
          - name: _partition_date
            description: S3 分区日期
          - name: _loaded_at
            description: Snowpipe 加载时间

      - name: orders
        description: 订单数据（Snowpipe 按天追加）
        columns:
          - name: order_id
            description: 订单唯一标识
            tests:
              - not_null
          - name: customer_id
            description: 客户 ID
            tests:
              - not_null
          - name: order_date
            description: 订单日期
            tests:
              - not_null
          - name: total_amount
            description: 订单总金额
            tests:
              - not_null
          - name: status
            description: 订单状态
            tests:
              - not_null
          - name: _partition_date
            description: S3 分区日期
          - name: _loaded_at
            description: Snowpipe 加载时间

      - name: order_items
        description: 订单明细（Snowpipe 按天追加）
        columns:
          - name: order_item_id
            description: 订单明细唯一标识
            tests:
              - not_null
          - name: order_id
            description: 订单 ID
            tests:
              - not_null
          - name: product_id
            description: 产品 ID
            tests:
              - not_null
          - name: quantity
            description: 数量
            tests:
              - not_null
          - name: unit_price
            description: 单价
            tests:
              - not_null
          - name: _partition_date
            description: S3 分区日期
          - name: _loaded_at
            description: Snowpipe 加载时间

  - name: analytics
    description: QuickSight 分析数据源表（旧，保留兼容）
    database: QUICKSIGHT_DB
    schema: ANALYTICS

    tables:
      - name: customers
        description: 客户主表
      - name: orders
        description: 订单主表
      - name: order_items
        description: 订单明细表
