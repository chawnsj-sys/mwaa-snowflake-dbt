version: 2

sources:
  - name: tpch
    description: Snowflake Sample Data - TPC-H
    database: SNOWFLAKE_SAMPLE_DATA
    schema: TPCH_SF1
    
    tables:
      - name: customer
        description: TPC-H 客户表
      - name: orders
        description: TPC-H 订单表
      - name: lineitem
        description: TPC-H 订单明细表

  - name: analytics
    description: QuickSight 分析数据源表
    database: QUICKSIGHT_DB
    schema: ANALYTICS
    
    tables:
      - name: customers
        description: 客户主表
        columns:
          - name: customer_id
            description: 客户唯一标识
            tests:
              - unique
              - not_null
          - name: name
            description: 客户姓名
            tests:
              - not_null
          - name: email
            description: 客户邮箱
            tests:
              - not_null
          - name: city
            description: 城市
          - name: registration_date
            description: 注册日期
      
      - name: orders
        description: 订单主表
        columns:
          - name: order_id
            description: 订单唯一标识
            tests:
              - unique
              - not_null
          - name: customer_id
            description: 客户 ID
            tests:
              - not_null
          - name: order_date
            description: 订单日期
            tests:
              - not_null
          - name: status
            description: 订单状态
            tests:
              - not_null
          - name: total_amount
            description: 订单总金额
            tests:
              - not_null
      
      - name: order_items
        description: 订单明细表
        columns:
          - name: item_id
            description: 订单明细唯一标识
            tests:
              - unique
              - not_null
          - name: order_id
            description: 订单 ID
            tests:
              - not_null
          - name: product_id
            description: 产品 ID
            tests:
              - not_null
          - name: quantity
            description: 数量
            tests:
              - not_null
          - name: unit_price
            description: 单价
            tests:
              - not_null
      
      - name: products
        description: 产品信息表
        columns:
          - name: product_id
            description: 产品唯一标识
            tests:
              - unique
              - not_null
          - name: product_name
            description: 产品名称
          - name: category
            description: 产品类别
          - name: price
            description: 销售价格
          - name: cost
            description: 成本价格
      
      - name: customer_feedback
        description: 客户反馈表
        columns:
          - name: feedback_id
            description: 反馈唯一标识
            tests:
              - unique
              - not_null
          - name: customer_id
            description: 客户 ID
          - name: order_id
            description: 订单 ID
          - name: rating
            description: 评分 (1-5)
          - name: comment
            description: 反馈评论
          - name: feedback_date
            description: 反馈日期
