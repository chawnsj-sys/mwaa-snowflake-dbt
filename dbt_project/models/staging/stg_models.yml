version: 2

models:
  - name: stg_customers
    description: 客户维度表（incremental merge）
    columns:
      - name: customer_id
        description: 客户唯一标识
        tests:
          - unique
          - not_null
      - name: customer_name
        description: 客户姓名
        tests:
          - not_null
      - name: email
        description: 邮箱（小写）
        tests:
          - not_null
      - name: _partition_date
        description: S3 分区日期
      - name: _loaded_at
        description: Snowpipe 加载时间
        tests:
          - not_null

  - name: stg_orders
    description: 订单事实表（incremental append）
    columns:
      - name: order_id
        description: 订单唯一标识
        tests:
          - not_null
      - name: customer_id
        description: 客户 ID
        tests:
          - not_null
      - name: status
        description: 订单状态（小写）
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pending', 'completed', 'cancelled']
      - name: total_amount
        description: 订单总金额
        tests:
          - not_null
      - name: _partition_date
        description: S3 分区日期
      - name: _loaded_at
        description: Snowpipe 加载时间

  - name: stg_order_items
    description: 订单明细事实表（incremental append）
    columns:
      - name: order_item_id
        description: 订单明细唯一标识
        tests:
          - not_null
      - name: order_id
        description: 订单 ID
        tests:
          - not_null
      - name: _partition_date
        description: S3 分区日期
      - name: _loaded_at
        description: Snowpipe 加载时间
