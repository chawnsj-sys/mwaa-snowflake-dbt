name: Deploy to MWAA

on:
  push:
    branches: [main]
    paths:
      - "dags/**"
      - "dbt_project/**"
      - "requirements/**"

env:
  BUCKET_NAME: "mwaa-snowflake-dags-782683897770"
  AWS_REGION: "us-east-1"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::782683897770:role/github-actions-mwaa-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync DAGs to S3
        run: |
          aws s3 sync dags/ s3://${{ env.BUCKET_NAME }}/dags/ \
            --delete \
            --exclude '__pycache__/*' \
            --exclude '*.pyc'

      - name: Sync dbt project to S3
        run: |
          aws s3 sync dbt_project/ s3://${{ env.BUCKET_NAME }}/dags/dbt_project/ \
            --delete \
            --exclude 'target/*' \
            --exclude 'logs/*' \
            --exclude 'dbt_packages/*' \
            --exclude '.env' \
            --exclude '.user.yml'

      - name: Sync requirements to S3
        run: |
          aws s3 cp requirements/requirements.txt s3://${{ env.BUCKET_NAME }}/requirements.txt

      # 上传 dbt manifest 供 Slim CI 使用（state-based builds）
      - name: Upload production manifest for Slim CI
        run: |
          # 安装 dbt 编译生成 manifest
          pip install dbt-snowflake -q
          cd dbt_project && dbt deps --profiles-dir . 2>/dev/null || true
          dbt compile --profiles-dir . --target prod 2>/dev/null || true
          # 上传 manifest 到 S3
          if [ -f target/manifest.json ]; then
            aws s3 cp target/manifest.json s3://${{ env.BUCKET_NAME }}/dbt-artifacts/manifest.json
            echo "✅ Production manifest uploaded for Slim CI"
          fi
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
